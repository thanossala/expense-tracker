<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-hover: rgba(0,0,0,0.25);
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .app { max-width: 640px; margin: 0 auto; }

    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 22px; font-weight: 500; }
    .header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-bottom: 1.25rem; }
    .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px; }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .stat-val { font-size: 22px; font-weight: 500; color: var(--text); }
    .stat-val.danger { color: #A32D2D; }

    .add-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 1rem; }
    .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .add-row:last-child { margin-bottom: 0; }
    .add-row input, .add-row select {
      flex: 1;
      padding: 8px 10px;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      outline: none;
    }
    .add-row input:focus, .add-row select:focus { border-color: var(--text); }
    .add-row input[type="number"] { max-width: 130px; }
    .add-row input[type="date"] { max-width: 160px; }
    .add-btn {
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 0 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .add-btn:hover { opacity: 0.85; }

    .chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .chart-title { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

    .filters { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn {
      background: transparent;
      border: 0.5px solid var(--border-hover);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

    .expense-list { display: flex; flex-direction: column; gap: 6px; }

    .expense-item {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .exp-body { flex: 1; min-width: 0; }
    .exp-desc { font-size: 14px; color: var(--text); }
    .exp-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .exp-amount { font-size: 15px; font-weight: 500; color: var(--text); white-space: nowrap; }
    .exp-del {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.15s;
    }
    .exp-del:hover { color: var(--text); }

    .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 14px; }

    @media (max-width: 480px) {
      .add-row { flex-wrap: wrap; }
      .add-row input[type="number"] { max-width: 100%; }
      .add-row input[type="date"] { max-width: 100%; }
      .stats { grid-template-columns: 1fr 1fr; }
      .stats .stat:last-child { grid-column: span 2; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Expense Tracker</h1>
    <p>Παρακολούθησε τα έξοδά σου</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Σύνολο εξόδων</div>
      <div class="stat-val danger" id="s-total">€0.00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Αυτόν τον μήνα</div>
      <div class="stat-val" id="s-month">€0.00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Συναλλαγές</div>
      <div class="stat-val" id="s-count">0</div>
    </div>
  </div>

  <div class="add-card">
    <div class="add-row">
      <input type="text" id="inp-desc" placeholder="Περιγραφή (π.χ. Καφές)" />
      <input type="number" id="inp-amount" placeholder="€ Ποσό" min="0" step="0.01" />
    </div>
    <div class="add-row">
      <select id="inp-cat">
        <option value="food">Φαγητό</option>
        <option value="transport">Μεταφορά</option>
        <option value="entertainment">Διασκέδαση</option>
        <option value="education">Εκπαίδευση</option>
        <option value="health">Υγεία</option>
        <option value="other">Άλλο</option>
      </select>
      <input type="date" id="inp-date" />
      <button class="add-btn" onclick="addExpense()">+ Προσθήκη</button>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Έξοδα ανά κατηγορία</div>
    <canvas id="myChart" height="160"></canvas>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Όλα</button>
    <button class="filter-btn" onclick="setFilter('food',this)">Φαγητό</button>
    <button class="filter-btn" onclick="setFilter('transport',this)">Μεταφορά</button>
    <button class="filter-btn" onclick="setFilter('entertainment',this)">Διασκέδαση</button>
    <button class="filter-btn" onclick="setFilter('education',this)">Εκπαίδευση</button>
    <button class="filter-btn" onclick="setFilter('health',this)">Υγεία</button>
    <button class="filter-btn" onclick="setFilter('other',this)">Άλλο</button>
  </div>

  <div class="expense-list" id="exp-list"></div>
</div>

<script>
  const CATS = {
    food:          { label: 'Φαγητό',      color: '#1D9E75' },
    transport:     { label: 'Μεταφορά',    color: '#378ADD' },
    entertainment: { label: 'Διασκέδαση',  color: '#D4537E' },
    education:     { label: 'Εκπαίδευση', color: '#7F77DD' },
    health:        { label: 'Υγεία',       color: '#D85A30' },
    other:         { label: 'Άλλο',        color: '#888780' },
  };

  let expenses = [];
  let filter = 'all';
  let chart = null;

  try { expenses = JSON.parse(localStorage.getItem('expenses_v1') || '[]'); } catch(e) { expenses = []; }

  function save() { try { localStorage.setItem('expenses_v1', JSON.stringify(expenses)); } catch(e) {} }

  function todayStr() { return new Date().toISOString().split('T')[0]; }

  document.getElementById('inp-date').value = todayStr();
  document.getElementById('inp-desc').addEventListener('keydown', e => { if (e.key === 'Enter') addExpense(); });

  function addExpense() {
    const desc = document.getElementById('inp-desc').value.trim();
    const amount = parseFloat(document.getElementById('inp-amount').value);
    if (!desc || isNaN(amount) || amount <= 0) return;
    const cat = document.getElementById('inp-cat').value;
    const date = document.getElementById('inp-date').value || todayStr();
    expenses.unshift({ id: Date.now(), desc, amount, cat, date });
    save();
    document.getElementById('inp-desc').value = '';
    document.getElementById('inp-amount').value = '';
    render();
  }

  function deleteExpense(id) {
    expenses = expenses.filter(e => e.id !== id);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function fmt(n) { return '€' + n.toFixed(2); }

  function thisMonth() {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  }

  function render() {
    const total = expenses.reduce((s, e) => s + e.amount, 0);
    const monthTotal = expenses
      .filter(e => e.date.startsWith(thisMonth()))
      .reduce((s, e) => s + e.amount, 0);

    document.getElementById('s-total').textContent = fmt(total);
    document.getElementById('s-month').textContent = fmt(monthTotal);
    document.getElementById('s-count').textContent = expenses.length;

    updateChart();

    const list = filter === 'all' ? expenses : expenses.filter(e => e.cat === filter);
    const container = document.getElementById('exp-list');

    if (list.length === 0) {
      container.innerHTML = '<div class="empty">Δεν υπάρχουν έξοδα εδώ.</div>';
      return;
    }

    container.innerHTML = list.map(e => {
      const cat = CATS[e.cat] || CATS.other;
      const [y, m, d] = e.date.split('-');
      return `
        <div class="expense-item">
          <div class="cat-dot" style="background:${cat.color}"></div>
          <div class="exp-body">
            <div class="exp-desc">${esc(e.desc)}</div>
            <div class="exp-meta">${cat.label} · ${d}/${m}/${y}</div>
          </div>
          <div class="exp-amount">${fmt(e.amount)}</div>
          <button class="exp-del" onclick="deleteExpense(${e.id})">×</button>
        </div>`;
    }).join('');
  }

  function updateChart() {
    const catTotals = Object.keys(CATS)
      .map(key => ({
        label: CATS[key].label,
        color: CATS[key].color,
        total: expenses
          .filter(e => e.cat === key)
          .reduce((s, e) => s + e.amount, 0)
      }))
      .filter(c => c.total > 0);

    if (chart) { chart.destroy(); chart = null; }
    if (catTotals.length === 0) return;

    chart = new Chart(document.getElementById('myChart'), {
      type: 'doughnut',
      data: {
        labels: catTotals.map(c => c.label),
        datasets: [{
          data: catTotals.map(c => c.total),
          backgroundColor: catTotals.map(c => c.color),
          borderWidth: 0,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'right',
            labels: { font: { size: 12 }, padding: 14, color: '#6b6b6b' }
          },
          tooltip: {
            callbacks: { label: ctx => ` €${ctx.raw.toFixed(2)}` }
          }
        },
        cutout: '65%'
      }
    });
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  render();
</script>

</body>
</html>
